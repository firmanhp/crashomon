services:
  crashomon-web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    env_file: .env
    ports:
      - "5000:5000"
    volumes:
      - crashomon-data:/data
      # Optional: bind-mount pre-built native binaries to enable auto-symbolication.
      # Build them first: cmake -B build && cmake --build build
      # Uncomment the lines below and adjust paths to match your build directory.
      #
      # - ../build-analyze/rust_minidump_target/release/minidump-stackwalk:/usr/local/bin/minidump-stackwalk:ro
      # - ../_dump_syms_build/dump_syms:/usr/local/bin/dump_syms:ro
    restart: unless-stopped

volumes:
  crashomon-data:
