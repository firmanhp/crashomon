{% extends "base.html" %}
{% block title %}Upload — Crashomon{% endblock %}
{% block content %}
<h1>Upload Crash</h1>

<h2>Upload minidump (.dmp)</h2>
<form method="post" action="{{ url_for('upload_crash') }}" enctype="multipart/form-data"
      style="display:flex; gap:0.5rem; align-items:center; margin-bottom:2rem;">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <input type="file" name="minidump" accept=".dmp">
  <button class="btn" type="submit">Analyze</button>
</form>

{% endblock %}
