<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Crashomon{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: "Fira Mono", "Consolas", monospace; margin: 0; background: #1a1a1a; color: #d4d4d4; }
    a { color: #7ab3f5; text-decoration: none; }
    a:hover { text-decoration: underline; }
    nav { background: #111; padding: 0.5rem 1.5rem; border-bottom: 1px solid #333; display: flex; gap: 1.5rem; align-items: center; }
    nav .brand { color: #e8c97e; font-weight: bold; }
    main { padding: 1.5rem 2rem; max-width: 1200px; }
    h1 { color: #b0c4de; margin-top: 0; }
    h2 { color: #a0b8d0; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 1rem; }
    th, td { border: 1px solid #3a3a3a; padding: 0.4rem 0.75rem; text-align: left; }
    th { background: #242424; color: #b0c4de; }
    tr:hover td { background: #202020; }
    pre { background: #111; border: 1px solid #333; padding: 1rem; overflow-x: auto; font-size: 0.82em; line-height: 1.5; }
    input, textarea { background: #111; border: 1px solid #444; color: #d4d4d4; padding: 0.3rem 0.5rem; font-family: inherit; }
    input:focus, textarea:focus { outline: 1px solid #7ab3f5; }
    .btn { display: inline-block; padding: 0.3rem 0.8rem; background: #2a2a2a; border: 1px solid #555; color: #d4d4d4; cursor: pointer; font-family: inherit; font-size: inherit; }
    .btn:hover { background: #383838; text-decoration: none; }
    .btn-danger { background: #3a1a1a; border-color: #7a2a2a; color: #e07070; }
    .btn-danger:hover { background: #4a2020; }
    form.inline { display: inline; }
    .muted { color: #777; font-size: 0.9em; }
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="{{ url_for('dashboard') }}">crashomon</a>
    <a href="{{ url_for('crashes') }}">crashes</a>
    <a href="{{ url_for('symbols') }}">symbols</a>
    <a href="{{ url_for('upload_form') }}">upload</a>
  </nav>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div style="padding: 0.5rem 2rem;">
        {% for category, message in messages %}
          <div style="
            margin-bottom: 0.4rem;
            padding: 0.4rem 0.8rem;
            border: 1px solid {% if category == 'error' %}#7a2a2a{% elif category == 'success' %}#2a7a2a{% else %}#7a5a1a{% endif %};
            background: {% if category == 'error' %}#3a1a1a{% elif category == 'success' %}#1a3a1a{% else %}#2a200a{% endif %};
            color: {% if category == 'error' %}#e07070{% elif category == 'success' %}#7ec87e{% else %}#e0b870{% endif %};
            font-size: 0.9em;
          ">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
